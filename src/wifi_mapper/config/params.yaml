# ============================================================
#  wifi_mapper — paramètres de configuration
# ============================================================
#
#  Trajectoire carrée :
#    steps_per_side × step_size = longueur d'un côté
#
#  Exemple (défaut) :
#    5 pas × 0.35 m = côté de 1.75 m
#    Total : 4×5+1 = 21 points de mesure
#
#  Lancement :
#    ros2 launch wifi_mapper wifi_mapper.launch.py
#    ros2 launch wifi_mapper wifi_mapper.launch.py steps_per_side:=4 step_size:=0.40
# ============================================================

explorer_node:
  ros__parameters:

    # Nombre de pas tout droit par côté du carré
    steps_per_side: 5

    # Distance entre deux points consécutifs (mètres)
    # Petite salle : 0.30–0.40 m recommandé
    step_size: 0.30

    # Vitesses
    linear_speed:  0.15    # m/s  (Create 3 max ≈ 0.46 m/s)
    angular_speed: 0.5     # rad/s

    # Durée d'arrêt à chaque point pour la mesure WiFi
    scan_duration: 3.0     # s  (augmentez si iperf3 actif)


wifi_scanner_node:
  ros__parameters:

    # Interface WiFi (détection automatique si absente)
    # Pour trouver le nom : ip link show | grep -E 'wlan|wlp'
    interface: wlan0

    # iperf3 : désactivé par défaut (mesure via RSSI)
    # Activez si vous avez un serveur iperf3 : iperf3 -s
    use_iperf3:      false
    iperf3_server:   192.168.1.1
    iperf3_duration: 3

    # Fichier de sortie — accessible sur la machine hôte via ~/ros2_ws/wifi_results/
    data_file: /root/ros2_ws/wifi_results/wifi_data.json


heatmap_node:
  ros__parameters:

    data_file:  /root/ros2_ws/wifi_results/wifi_data.json
    output_dir: /root/ros2_ws/wifi_results

    # Résolution de la grille d'interpolation (pixels par axe)
    resolution: 150
